# SPLARO nginx — /etc/nginx/sites-available/splaro.co
# Per-host routing to PM2 apps: web:3000, admin:3001, api:4000
# Reload: nginx -t && systemctl reload nginx

# client_max_body_size / proxy_buffer_* now live in the global
# infrastructure/vps/nginx-http-performance.conf (installed to conf.d,
# loaded before sites-enabled) — declaring them again here made `nginx -t`
# fail with "directive is duplicate" during deploy's nginx-perf step.

server {
    server_name splaro.co www.splaro.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/splaro.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/splaro.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    server_name admin.splaro.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/splaro.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/splaro.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    server_name api.splaro.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = / {
        return 302 /api/v1/;
    }

    location = /api {
        return 302 /api/v1/;
    }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/splaro.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/splaro.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = www.splaro.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = splaro.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name splaro.co www.splaro.co;
    return 404; # managed by Certbot




}

server {
    if ($host = api.splaro.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name api.splaro.co;
    return 404; # managed by Certbot


}

server {
    if ($host = admin.splaro.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name admin.splaro.co;
    return 404; # managed by Certbot


}