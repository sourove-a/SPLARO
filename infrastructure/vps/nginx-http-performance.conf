# SPLARO — http-level performance (installed to /etc/nginx/conf.d/splaro-performance.conf)
# Safe to include via conf.d — loaded before sites-enabled.

client_max_body_size 25m;
proxy_buffer_size 16k;
proxy_buffers 4 32k;
proxy_busy_buffers_size 64k;

# Rate limits (used by splaro-co-*.conf) — skipped on install if zones already exist.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;

# Compression — JSON/HTML/CSS/JS; images are already compressed.
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/woff2;
