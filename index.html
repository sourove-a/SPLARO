    <style>
        :root {

            --splaro-white: #FFFFFF;

            --mobile-safe-top: env(safe-area-inset-top, 0px);
            
            --bg-main: var(--splaro-midnight);
            --text-main: var(--splaro-white);
            --font-primary: 'Outfit', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        .dark {
            --bg-main: #000000;
            --text-main: #FFFFFF;
        }

        .light {
            --bg-main: #F9FAFB;
            --text-main: #000000;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.05);
        }

        :root[data-splaro-glow="reduced"] {
            --glow-strength: 0px;
            --ribbed-opacity: 0.02;
        }

        .light {
            --bg-main: #FFFFFF;
            --text-main: #000000;
            --text-dim: rgba(0, 0, 0, 0.55);
            --glass-bg: rgba(245, 245, 245, 0.95);
            --glass-border: rgba(0, 0, 0, 0.05);

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
            overflow-y: auto;
            width: 100%;
            min-height: 100%;
            height: auto;
            -webkit-overflow-scrolling: touch;
            scroll-padding-bottom: calc(var(--mobile-nav-height) + var(--mobile-safe-bottom) + 12px);
        }

        body {

            color: var(--text-main);
            transition: background-color 0.35s ease, color 0.25s ease;

            overflow-x: hidden;

        /* Advanced Maximalist Reveal System */
        [data-reveal] {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s var(--reveal-ease, cubic-bezier(0.16, 1, 0.3, 1)), transform 0.8s var(--reveal-ease, cubic-bezier(0.16, 1, 0.3, 1));
            will-change: opacity, transform;
        }
        [data-reveal="true"] {

            transform: translateY(0);

            border-radius: var(--splaro-radius, 32px);

                inset 0 0 0 1px rgba(255, 255, 255, 0.08),
                inset 0 1px 1px rgba(255, 255, 255, 0.2),
                inset 0 -1px 20px rgba(111, 224, 255, 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);

        .liquid-glass:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%), var(--glass-bg);

        .ticker-marquee {
            display: flex;

            padding: 1rem 0;

            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ticker-content {
            display: flex;
            animation: ticker 40s linear infinite;
            gap: 100px;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .bento-wide { grid-column: span 2; }
        .bento-tall { grid-row: span 2; }

        @media (max-width: 768px) {
            .bento-wide, .bento-tall { grid-column: span 1; grid-row: span 1; }
        }

        .ribbed-texture {
            display: none !important;
            background-image: none !important;
        }

        @keyframes shine-sweep {
            0% {
                transform: translateX(-180%) skewX(-24deg);
                opacity: 0;
            }

            50% {
                opacity: 0.12;
            }

            100% {
                transform: translateX(320%) skewX(-24deg);
                opacity: 0;
            }
        }

        .shine-sweep {
            position: absolute;
            top: 0;
            left: -34%;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(184, 241, 255, 0.22), transparent);
            animation: shine-sweep 9s infinite cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            will-change: transform, opacity;
            border-radius: inherit;
        }

        .card,
        .nav-item,

            position: relative;

<body class="dark">
    <div id="root"></div>
    <script>
        (function () {
            var BOOT_TIMEOUT_MS = 8000;
            var FALLBACK_ID = 'splaro-boot-fallback';

            function createFallback(reason) {
                if (document.getElementById(FALLBACK_ID)) return;

                var root = document.getElementById('root');
                if (!root) return;

                var box = document.createElement('div');
                box.id = FALLBACK_ID;
                box.style.minHeight = '100vh';
                box.style.display = 'flex';
                box.style.alignItems = 'center';
                box.style.justifyContent = 'center';
                box.style.background = '#050d1a';
                box.style.color = '#e8f4ff';
                box.style.padding = '24px';
                box.style.fontFamily = 'Inter, sans-serif';
                box.style.position = 'relative';
                box.style.zIndex = '9999';

                var panel = document.createElement('div');
                panel.style.maxWidth = '540px';
                panel.style.width = '100%';
                panel.style.border = '1px solid rgba(148,222,255,0.35)';
                panel.style.borderRadius = '18px';
                panel.style.padding = '22px';
                panel.style.background = 'rgba(9,22,41,0.86)';
                panel.style.boxShadow = '0 20px 50px rgba(0,0,0,0.45)';

                var title = document.createElement('h2');
                title.textContent = 'SPLARO client reload required';
                title.style.margin = '0 0 10px';
                title.style.fontSize = '20px';
                title.style.fontWeight = '800';

                var text = document.createElement('p');
                text.textContent = 'The app bundle did not initialize correctly. Clear stale cache and reload.';
                text.style.margin = '0 0 14px';
                text.style.fontSize = '13px';
                text.style.lineHeight = '1.5';
                text.style.color = 'rgba(227,236,250,0.82)';

                var meta = document.createElement('p');
                meta.textContent = 'Signal: ' + reason;
                meta.style.margin = '0 0 16px';
                meta.style.fontSize = '11px';
                meta.style.letterSpacing = '0.08em';
                meta.style.textTransform = 'uppercase';
                meta.style.color = 'rgba(111,224,255,0.78)';

                var row = document.createElement('div');
                row.style.display = 'flex';
                row.style.gap = '10px';
                row.style.flexWrap = 'wrap';

                var hardReloadBtn = document.createElement('button');
                hardReloadBtn.type = 'button';
                hardReloadBtn.textContent = 'Clear Cache + Reload';
                hardReloadBtn.style.height = '40px';
                hardReloadBtn.style.padding = '0 16px';
                hardReloadBtn.style.borderRadius = '999px';
                hardReloadBtn.style.border = '1px solid rgba(111,224,255,0.5)';
                hardReloadBtn.style.background = 'rgba(31,144,255,0.28)';
                hardReloadBtn.style.color = '#eaffff';
                hardReloadBtn.style.cursor = 'pointer';
                hardReloadBtn.onclick = function () {
                    var cleanup = [];
                    if ('serviceWorker' in navigator) {
                        cleanup.push(
                            navigator.serviceWorker.getRegistrations().then(function (regs) {
                                return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
                            })
                        );
                    }
                    if ('caches' in window) {
                        cleanup.push(
                            caches.keys().then(function (keys) {
                                return Promise.all(keys.map(function (key) { return caches.delete(key); }));
                            })
                        );
                    }
                    Promise.all(cleanup).finally(function () {
                        try {
                            localStorage.removeItem('splaro-push-soft-dismissed');
                            sessionStorage.clear();
                        } catch (_) { }
                        window.location.reload();
                    });
                };

                var refreshBtn = document.createElement('button');
                refreshBtn.type = 'button';
                refreshBtn.textContent = 'Reload Now';
                refreshBtn.style.height = '40px';
                refreshBtn.style.padding = '0 16px';
                refreshBtn.style.borderRadius = '999px';
                refreshBtn.style.border = '1px solid rgba(255,255,255,0.28)';
                refreshBtn.style.background = 'transparent';
                refreshBtn.style.color = '#eaf4ff';
                refreshBtn.style.cursor = 'pointer';
                refreshBtn.onclick = function () {
                    window.location.reload();
                };

                row.appendChild(hardReloadBtn);
                row.appendChild(refreshBtn);

                panel.appendChild(title);
                panel.appendChild(text);
                panel.appendChild(meta);
                panel.appendChild(row);
                box.appendChild(panel);

                if (root.childNodes.length === 0) {
                    root.appendChild(box);
                }
            }

            function isRootHydrated() {
                if (window.__SPLARO_APP_BOOTED === true) return true;
                var root = document.getElementById('root');
                if (!root) return false;
                if (root.childElementCount === 0) return false;
                return root.textContent.trim().length > 0 || root.querySelector('*') !== null;
            }

            window.addEventListener('error', function (event) {
                var target = event && event.target;
                if (target && target.tagName === 'SCRIPT') {
                    createFallback('SCRIPT_LOAD_FAILED');
                }
            }, true);

            window.addEventListener('unhandledrejection', function () {
                window.setTimeout(function () {
                    if (!isRootHydrated()) createFallback('RUNTIME_REJECTION');
                }, 200);
            });

            window.setTimeout(function () {
                if (!isRootHydrated()) createFallback('BOOT_TIMEOUT');
            }, BOOT_TIMEOUT_MS);
        })();
    </script>
    <script type="module" src="/index.tsx"></script>
</body>
