services:
  postgres:
    image: postgres:16-alpine
    container_name: splaro-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: splaro_db
    volumes:
      - splaro_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d splaro_db']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: splaro-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - splaro_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  splaro_pg_data:
  splaro_redis_data:
