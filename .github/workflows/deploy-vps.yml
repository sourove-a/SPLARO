name: Deploy VPS

# Push main → SSH VPS → /opt/splaro/deploy.sh
# GitHub → Settings → Secrets → Actions:
#   VPS_HOST (or VPS_SSH_HOST), VPS_USER (or VPS_SSH_USER), VPS_SSH_KEY (or VPS_SSH_PRIVATE_KEY)

on:
  workflow_dispatch:
  # Gated on CI: deploy only runs after the CI workflow succeeds on main,
  # so lint/type/build failures never reach the VPS.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: >-
      github.repository == 'sourove-a/SPLARO' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || secrets.VPS_SSH_HOST }}
          VPS_USER: ${{ secrets.VPS_USER || secrets.VPS_SSH_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || secrets.VPS_SSH_PORT || 22 }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ env.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            echo "Deploy commit: ${{ github.sha }}"
            bash /opt/splaro/deploy.sh

      - name: Smoke test
        run: |
          check() {
            code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$1" || echo 000)"
            echo "$2 → HTTP $code ($1)"
            [ "$code" = "200" ]
          }
          check_redirect() {
            code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$1" || echo 000)"
            echo "$2 → HTTP $code ($1)"
            [ "$code" = "302" ] || [ "$code" = "301" ] || [ "$code" = "200" ]
          }
          sleep 8
          fail=0
          check "https://splaro.co" web || fail=1
          check "https://splaro.co/api/v1/health" api || fail=1
          check_redirect "https://api.splaro.co/" api-root || fail=1
          curl -sf --max-time 30 "https://admin.splaro.co/api/ping" | grep -q '"online":true' \
            || { echo "admin ping → database/api offline"; fail=1; }
          check "https://admin.splaro.co/login" admin || echo "::warning::admin login check failed (non-blocking)"
          exit "$fail"
