name: Deploy VPS

# PRIMARY production deploy: CI green on main → SSH VPS → /opt/splaro/deploy.sh
# Secrets (Actions): VPS_HOST, VPS_USER, VPS_SSH_KEY (+ optional aliases VPS_SSH_*)
# Repo Deploy key (read-only): splaro-vps-read  ← VPS uses this for git pull
# Re-sync from Mac anytime: pnpm setup:github-deploy:sync

on:
  workflow_dispatch:
  # Gated on CI: deploy only runs after the CI workflow succeeds on main,
  # so lint/type/build failures never reach the VPS.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  # One deploy at a time. Never cancel an active build: interruption can leave
  # partial .next output and race the next SSH job on the same checkout.
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: >-
      github.repository == 'sourove-a/SPLARO' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v4

      - name: Verify deploy secrets exist
        run: |
          missing=0
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ] && [ -z "${{ secrets.VPS_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing VPS_SSH_KEY (or VPS_SSH_PRIVATE_KEY). Run on VPS:"
            echo "  curl -fsSL https://raw.githubusercontent.com/sourove-a/SPLARO/main/infrastructure/vps/hpanel-bootstrap-github.sh | bash"
            echo "Then on Mac: pnpm setup:github-deploy:sync"
            missing=1
          fi
          if [ -z "${{ secrets.VPS_HOST }}" ] && [ -z "${{ secrets.VPS_SSH_HOST }}" ]; then
            echo "::error::Missing VPS_HOST (current IP: dig +short splaro.co A)"
            missing=1
          fi
          if [ -z "${{ secrets.VPS_USER }}" ] && [ -z "${{ secrets.VPS_SSH_USER }}" ]; then
            echo "::warning::VPS_USER not set — defaulting to root in SSH step"
          fi
          exit "$missing"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || secrets.VPS_SSH_HOST }}
          VPS_USER: ${{ secrets.VPS_USER || secrets.VPS_SSH_USER || 'root' }}
          VPS_PORT: ${{ secrets.VPS_PORT || secrets.VPS_SSH_PORT || 22 }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ env.VPS_PORT }}
          command_timeout: 30m
          envs: DEPLOY_SHA
          script: |
            set -euo pipefail
            echo "CI-approved deploy commit: $DEPLOY_SHA"
            if [ ! -x /opt/splaro/deploy.sh ]; then
              echo "Missing /opt/splaro/deploy.sh — run hpanel-bootstrap-github.sh on VPS once"
              exit 1
            fi
            export SPLARO_DEPLOY_SHA="$DEPLOY_SHA"
            bash /opt/splaro/deploy.sh

      - name: Smoke test
        run: |
          # Retries absorb transient runner→VPS network blips (curl 000) so a
          # genuinely successful deploy doesn't get marked "failed" on a fluke —
          # this bit us: deploy completed and the site was verifiably live, but
          # a single 000 on one check red-flagged the whole run.
          retry_check() {
            local url="$1" label="$2" want="$3" attempts="${4:-3}"
            local i=1 code=000
            while [ "$i" -le "$attempts" ]; do
              code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$url" || echo 000)"
              if echo "$want" | grep -qw "$code"; then
                echo "$label → HTTP $code ($url) [attempt $i/$attempts]"
                return 0
              fi
              echo "$label → HTTP $code ($url) [attempt $i/$attempts, retrying]"
              i=$((i + 1))
              sleep 5
            done
            echo "$label → FAILED after $attempts attempts (last HTTP $code)"
            return 1
          }
          sleep 8
          fail=0
          retry_check "https://splaro.co" web "200" || fail=1
          retry_check "https://splaro.co/api/v1/health" api "200" || fail=1
          # Non-blocking: this specific check (bare api.splaro.co root, which
          # 302s to /api/v1/) has repeatedly returned curl 000 from GitHub's
          # runner network while every other check (including the API health
          # check above, which proves the exact same backend end-to-end) and
          # direct manual verification from outside GitHub both pass reliably.
          # No firewall/rate-limit/DNS/IPv6 cause found on the VPS side — most
          # likely a runner-network route quirk. Kept for visibility, doesn't
          # block a deploy that's otherwise provably healthy.
          retry_check "https://api.splaro.co/" api-root "200 301 302" || echo "::warning::api-root check failed (non-blocking — splaro.co/api/v1/health already proves the API)"
          curl -sf --max-time 30 "https://admin.splaro.co/api/ping" | grep -q '"online":true' \
            || { echo "admin ping → database/api offline"; fail=1; }
          retry_check "https://admin.splaro.co/login" admin "200" 3 || echo "::warning::admin login check failed (non-blocking)"
          exit "$fail"
