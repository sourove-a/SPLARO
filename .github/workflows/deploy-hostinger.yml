name: Deploy Hostinger (Git)

# Hostinger hPanel pulls this repo on every push to main (Git integration).
# No SSH secrets required — build runs on Hostinger: npm install → npm run build → npm start
# Full stack (web + admin + API) starts via post-git-deploy.sh after build.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-hostinger-git
  cancel-in-progress: false

jobs:
  hostinger-git-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Deploy info
        run: |
          echo "✅ Push to main — Hostinger hPanel auto-deploys (no SSH)"
          echo ""
          echo "Hostinger runs on server:"
          echo "  1. git pull origin main"
          echo "  2. npm install"
          echo "  3. npm run build  → scripts/hostinger-build.sh"
          echo "  4. post-git-deploy.sh → web + admin + API"
          echo ""
          echo "hPanel → Websites → splaro.co → Deployments (build log)"
          echo "Commit: ${{ github.sha }}"

      - name: Wait for Hostinger build
        run: |
          echo "Waiting 6 minutes for Hostinger Git build + post-deploy…"
          sleep 360

      - name: Live smoke test
        run: |
          check() {
            local name="$1" url="$2" attempt code
            for attempt in 1 2 3 4 5 6; do
              code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$url" || echo 000)"
              echo "$name attempt $attempt → HTTP $code ($url)"
              [ "$code" = "200" ] && return 0
              sleep 20
            done
            echo "FAIL: $name ($url)"
            return 1
          }
          FAILED=0
          check "web" "https://splaro.co" || FAILED=1
          check "api" "https://splaro.co/api/v1/health" || FAILED=1
          check "admin" "https://admin.splaro.co/login" || FAILED=1
          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "::warning::Live check failed — open hPanel → Deployments → latest build log"
            echo "One-time fix in hPanel SSH Terminal:"
            echo "  bash ~/domains/splaro.co/public_html/.builds/source/repository/infrastructure/hostinger/splaro-start-services.sh"
          fi
          exit 0
