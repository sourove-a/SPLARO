name: Deploy Hostinger (Git)

# Hostinger hPanel pulls main on push — npm install → npm run build → npm start
# No SSH secrets. Smoke test confirms splaro.co + admin + API after build.

on:
  workflow_dispatch:
  # Push disabled — SPLARO now deploys via deploy-vps.yml on VPS 194.238.24.155
  # push:
  #   branches: [main]

concurrency:
  group: deploy-hostinger-git
  cancel-in-progress: false

jobs:
  hostinger-git-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Deploy info
        run: |
          echo "Push to main → Hostinger hPanel auto-deploys (no SSH)"
          echo "Build: npm run build → post-git-deploy.sh"
          echo "Start: npm start → passenger-stack-app (web + api + proxy)"
          echo "Commit: ${{ github.sha }}"

      - name: Wait for Hostinger build (up to 25 min)
        run: |
          echo "Polling live URLs (Hostinger build ~15–20 min on shared hosting)…"
          check() {
            local name="$1" url="$2"
            local code
            code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$url" || echo 000)"
            echo "$name → HTTP $code ($url)"
            [ "$code" = "200" ]
          }
          for round in $(seq 1 50); do
            echo "--- round $round/50 ($(date -u +%H:%M:%S) UTC) ---"
            WEB_OK=0; API_OK=0; ADMIN_OK=0
            check web "https://splaro.co" && WEB_OK=1 || true
            check api "https://splaro.co/api/v1/health" && API_OK=1 || true
            check admin "https://admin.splaro.co/login" && ADMIN_OK=1 || true
            [ "$WEB_OK" = "1" ] && [ "$API_OK" = "1" ] && [ "$ADMIN_OK" = "1" ] && exit 0
            sleep 30
          done
          echo "::error::Live deploy not healthy after 25 minutes"
          echo "hPanel → splaro.co → Deployments → latest build log"
          echo "Or hPanel SSH Terminal (one-time):"
          echo "  bash ~/domains/splaro.co/public_html/.builds/source/repository/infrastructure/hostinger/splaro-start-services.sh"
          exit 1
