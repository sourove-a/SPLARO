name: Deploy Hostinger

on:
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  ssh-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Test SSH port
        run: |
          nc -zv -w 10 "${{ secrets.HOSTINGER_HOST }}" "${{ secrets.HOSTINGER_PORT || 65002 }}"

  deploy:
    needs: ssh-test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Remote deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT || 65002 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            APP_DIR="$HOME/splaro"
            mkdir -p "$APP_DIR"
            echo "${{ secrets.SPLARO_PRODUCTION_ENV_B64 }}" | base64 -d > "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/sourove-a/SPLARO.git "$APP_DIR"
            else
              cd "$APP_DIR" && git pull origin main
            fi
            cd "$APP_DIR"
            export SPLARO_APP_DIR="$APP_DIR"
            export SPLARO_DOMAIN=splaro.co
            export SPLARO_PM2_CONFIG=infrastructure/pm2/ecosystem.hostinger.config.js
            bash infrastructure/hostinger/deploy-remote.sh

      - name: Live smoke test
        run: |
          sleep 15
          check() {
            local name="$1" url="$2" attempt code
            for attempt in 1 2 3; do
              code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$url" || echo 000)"
              echo "$name attempt $attempt → HTTP $code"
              [ "$code" = "200" ] && return 0
              sleep 10
            done
            echo "FAIL: $name ($url) is not returning 200"
            return 1
          }
          FAILED=0
          check "web" "https://splaro.co" || FAILED=1
          check "api" "https://api.splaro.co/api/v1/health" || FAILED=1
          check "admin" "https://admin.splaro.co/login" || FAILED=1
          exit $FAILED
