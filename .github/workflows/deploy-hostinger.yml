name: Deploy Hostinger

on:
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Full live recovery on Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT || 65002 }}
          script_stop: false
          command_timeout: 40m
          script: |
            set +e
            export PATH="$HOME/mamba/env/envs/pg/bin:/opt/alt/alt-nodejs20/root/usr/bin:$HOME/.local/bin:$HOME/.local/share/pnpm:$PATH"
            REPO="$HOME/domains/splaro.co/public_html/.builds/source/repository"
            cd "$REPO" || exit 1
            git pull origin main
            bash infrastructure/hostinger/ssh-fix-all.sh

      - name: Live smoke test
        run: |
          sleep 20
          check() {
            local name="$1" url="$2" attempt code
            for attempt in 1 2 3 4; do
              code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$url" || echo 000)"
              echo "$name attempt $attempt → HTTP $code"
              [ "$code" = "200" ] && return 0
              sleep 15
            done
            echo "FAIL: $name ($url)"
            return 1
          }
          FAILED=0
          check "web" "https://splaro.co" || FAILED=1
          check "api" "https://splaro.co/api/v1/health" || FAILED=1
          check "admin" "https://admin.splaro.co/login" || FAILED=1
          exit $FAILED
