name: Legacy Hostinger smoke (manual)

# NOT production. Contabo Deploy VPS is the only auto-deploy.
# Manual URL smoke only — does not SSH or write to any host.

on:
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-git
  cancel-in-progress: false

jobs:
  hostinger-git-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Deploy info
        run: |
          echo "LEGACY: Hostinger path is not primary. Prefer Actions → Deploy VPS."
          echo "This job only polls live URLs (does not SSH-deploy)."
          echo "Trigger: ${{ github.event_name }}"

      - name: Smoke live URLs
        run: |
          check() {
            local name="$1" url="$2"
            local code
            code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$url" || echo 000)"
            echo "$name → HTTP $code ($url)"
            [ "$code" = "200" ]
          }
          fail=0
          check web "https://splaro.co" || fail=1
          check api "https://splaro.co/api/v1/health" || fail=1
          check admin "https://admin.splaro.co/login" || fail=1
          exit "$fail"
